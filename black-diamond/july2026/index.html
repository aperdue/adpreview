<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Black Diamond — July 2026 Display Ad Previews</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #1a1d24;
      --border: #2a2f3a;
      --text: #e6e8ec;
      --muted: #9aa1ad;
      --accent: #4da3ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 32px 24px 64px;
    }
    header {
      max-width: 1200px;
      margin: 0 auto 32px;
    }
    h1 { font-size: 2.5rem; margin: 0 0 6px; }
    header p { color: var(--muted); margin: 0; font-size: 0.9rem; }
    .grid {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 28px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .card h2 {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
      margin: 0;
      align-self: flex-start;
      word-break: break-word;
    }
    .ad-frame {
      box-sizing: content-box;
      width: 300px;
      height: 250px;
      border: 1px solid var(--border);
      background: #fff;
      overflow: hidden;
    }
    .ad-frame iframe {
      width: 300px;
      height: 250px;
      border: 0;
      display: block;
    }
    .card a {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.8rem;
      align-self: flex-start;
    }
    .card a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header>
    <h1>Black Diamond</h1>
      <h2>July 2026 Display Ad Previews</h2>
      Last updated: July 2, 2026
  </header>

    <div class="card">
